<!DOCTYPE html>
<html lang="en" data-theme="cupcake">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and icon -->
    <title>Github Issue Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            alert("login First!");
            window.location.replace("login.html");
        }
    </script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- theems -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- styleSheet -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class=" bg-base-200">

    <header>
        <div class="navbar bg-base-100 shadow-sm">

            <div class="flex-1">

                <h2 class="font-bold text-2xl">Github Issue Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto rounded-sm" />
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button"
                        class="btn btn-ghost btn-circle avatar online transition-transform hover:scale-105">
                        <div class="w-10 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                            <img src="./assets/github-logo.png" alt="User Profile" />
                        </div>
                    </div>

                    <ul tabindex="0"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-xl z-[1] mt-3 w-56 p-2 shadow-2xl border border-base-200">
                        <li class="menu-title text-xs opacity-60 uppercase tracking-wider">Appearance</li>

                        <li class="flex flex-row items-center justify-between px-4 py-2">
                            <span class="font-medium">Dark Mode</span>
                            <label class="swap swap-rotate text-primary">
                                <input type="checkbox" class="theme-controller" value="dark" />
                                <i class="fa-solid fa-sun swap-on text-xl"></i>
                                <i class="fa-solid fa-moon swap-off text-xl"></i>
                            </label>
                        </li>

                        <div class="divider my-1"></div>

                        <li>
                            <a id="logoutBtn" href="login.html"
                                class="flex items-center gap-3 p-3 text-error hover:bg-error/10 active:bg-error/20 transition-colors font-semibold">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <main class="min-h-screen max-w-7xl mx-auto my-6">
        <div id="navBtns" class="bg-white rounded-lg p-5 w-full">
            <button id="all" onclick="toggleStyle('all')" class="btn rounded-sm btn-primary toggleBtn">All</button>
            <button id="open" onclick="toggleStyle('open')" class="btn rounded-sm toggleBtn">Open</button>
            <button id="closed" onclick="toggleStyle('closed')" class="btn rounded-sm toggleBtn">Closed</button>

        </div>

        <div
            class="bg-white rounded-t-lg px-4 py-5 mt-3 max-w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center w-full md:w-2/3 gap-3">
                <div class="bg-base-200 shrink-0 w-[50px] h-[50px] rounded-full overflow-hidden">
                    <img class="w-full h-full object-cover" src="./assets/Aperture.png" alt="Logo">
                </div>
                <div>
                    <h2 id="count" class="font-semibold text-lg md:text-xl leading-tight">50 Issues</h2>
                    <p class="text-gray-400 text-xs md:text-sm">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-6 md:gap-10 font-medium text-sm md:text-base ml-1 md:ml-0">
                <p class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-600"></span>
                    </span>
                    Open
                </p>

                <p class="flex items-center gap-2">
                    <span class="inline-flex rounded-full h-3 w-3 bg-purple-600"></span>
                    Close
                </p>
            </div>
        </div>
        <div id="spinner" class="text-7xl text-center">
            <span class="loading loading-ring loading-xl"></span>
        </div>
        <section class="bg-[#FBFBFB]">

            <div id="cardContainer"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-[95%] md:max-w-6xl mx-auto mb-6">
            </div>

        </section>


        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box md:w-11/12 max-w-4xl p-0 overflow-hidden">

                <div id="detailContainer" class="p-6 md:p-8">
                </div>

            </div>
        </dialog>

          
    </main>
    <script>
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("isLoggedIn");
            window.location.replace("login.html");
        });
    </script>
    <script src="js/index.js"></script>

</body>

</html>
